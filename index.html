<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Śmieja Ubezpieczenia - Partnerzy</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#ffefef;
font-family:Arial, Helvetica, sans-serif;
overflow-x:hidden;
}

.wrapper{
padding:30px 0;
}

.title{
text-align:center;
font-size:30px;
font-weight:700;
color:#024069;
margin-bottom:30px;
}

.slider{

overflow:hidden;
position:relative;
width:100%;

}

.slider::before,
.slider::after{

content:"";
position:absolute;
top:0;
width:120px;
height:100%;
z-index:5;

}

.slider::before{

left:0;
background:linear-gradient(to left,rgba(255,239,239,0),#ffefef);

}

.slider::after{

right:0;
background:linear-gradient(to right,rgba(255,239,239,0),#ffefef);

}

.slide-track{

display:flex;
align-items:center;
width:max-content;
animation:scroll 45s linear infinite;

}

.slide-track:hover{

animation-play-state:paused;

}

.slide{

flex:0 0 auto;
display:flex;
justify-content:center;
align-items:center;
padding:0 45px;

}

.slide img{

height:65px;
width:auto;
object-fit:contain;
transition:.3s;

}

.slide img:hover{

transform:scale(1.08);

}

@keyframes scroll{

0%{
transform:translateX(0);
}

100%{
transform:translateX(-50%);
}

}

</style>

</head>

<body>

<div class="wrapper">

<div class="title">
Współpracuję z renomowanymi towarzystwami ubezpieczeniowymi
</div>

<div class="slider">

<div class="slide-track">

<div class="slide"><img src="logos/warta.png" alt="Warta"></div>
<div class="slide"><img src="logos/hdi.png" alt="HDI"></div>
<div class="slide"><img src="logos/allianz.png" alt="Allianz"></div>
<div class="slide"><img src="logos/pzu.png" alt="PZU"></div>
<div class="slide"><img src="logos/link4.png" alt="LINK4"></div>
<div class="slide"><img src="logos/ergohestia.png" alt="Ergo Hestia"></div>
<div class="slide"><img src="logos/generali.png" alt="Generali"></div>
<div class="slide"><img src="logos/interrisk.png" alt="InterRisk"></div>
<div class="slide"><img src="logos/proama.png" alt="Proama"></div>
<div class="slide"><img src="logos/trasti.png" alt="Trasti"></div>
<div class="slide"><img src="logos/direct.png" alt="Direct"></div>
<div class="slide"><img src="logos/uniqa.png" alt="UNIQA"></div>
<div class="slide"><img src="logos/mtu.png" alt="MTU"></div>

<!-- Powtórzenie dla płynnej animacji -->

<div class="slide"><img src="logos/warta.png" alt="Warta"></div>
<div class="slide"><img src="logos/hdi.png" alt="HDI"></div>
<div class="slide"><img src="logos/allianz.png" alt="Allianz"></div>
<div class="slide"><img src="logos/pzu.png" alt="PZU"></div>
<div class="slide"><img src="logos/link4.png" alt="LINK4"></div>
<div class="slide"><img src="logos/ergohestia.png" alt="Ergo Hestia"></div>
<div class="slide"><img src="logos/generali.png" alt="Generali"></div>
<div class="slide"><img src="logos/interrisk.png" alt="InterRisk"></div>
<div class="slide"><img src="logos/proama.png" alt="Proama"></div>
<div class="slide"><img src="logos/trasti.png" alt="Trasti"></div>
<div class="slide"><img src="logos/direct.png" alt="Direct"></div>
<div class="slide"><img src="logos/uniqa.png" alt="UNIQA"></div>
<div class="slide"><img src="logos/mtu.png" alt="MTU"></div>

</div>

</div>

</div>

</body>
</html>
